<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مزرعه میوه‌ها</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#bfe6f2;
    --sky-bottom:#eaf7e6;
    --soil:#7a4a26;
    --soil-dark:#5c351a;
    --soil-light:#a06a3d;
    --leaf:#4f9d3d;
    --leaf-dark:#3a7a2c;
    --sun:#ffc93c;
    --wood:#a9713f;
    --wood-dark:#7d4f28;
    --ink:#3a2b1a;
    --card:#fffaf0;
    --ready-glow:#ffe27a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; overflow-x:hidden;}
  body{
    font-family:'Vazirmatn', sans-serif;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, #d7ecc4 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:24px;
  }

  /* sun */
  .sun{
    position:absolute; top:14px; left:18px;
    width:46px; height:46px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff3c4, var(--sun) 70%);
    box-shadow:0 0 22px rgba(255,201,60,.7);
    animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

  header{
    width:100%;
    max-width:480px;
    padding:20px 16px 12px;
    text-align:center;
    position:relative;
  }
  h1{
    font-weight:900;
    font-size:26px;
    margin:6px 0 2px;
    color:var(--soil-dark);
    text-shadow:0 2px 0 rgba(255,255,255,.6);
  }
  .subtitle{font-size:13px; color:#5a6b4a; font-weight:500;}

  .hud{
    width:calc(100% - 32px);
    max-width:448px;
    margin-top:14px;
    background:var(--card);
    border:3px solid var(--wood-dark);
    border-radius:18px;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 4px 0 rgba(0,0,0,.12);
  }
  .hud-item{display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px;}
  .hud-icon{font-size:22px;}

  main{
    width:100%;
    max-width:480px;
    padding:18px 16px;
  }

  .field-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:15px;
    color:var(--soil-dark);
    margin-bottom:10px;
    padding-right:4px;
  }
  .field-tag{
    background:var(--leaf);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:2px 10px;
    border-radius:999px;
  }

  .field{
    background:linear-gradient(180deg, var(--wood) 0%, var(--wood-dark) 100%);
    border-radius:22px;
    padding:16px;
    box-shadow:0 6px 0 rgba(0,0,0,.15), inset 0 0 0 3px rgba(255,255,255,.08);
  }

  .plots{
    display:grid;
    grid-template-columns:repeat(1, 1fr);
    gap:10px;
  }

  .plot{
    position:relative;
    height:64px;
    border-radius:14px;
    background:linear-gradient(180deg, var(--soil-light), var(--soil));
    border:2px solid var(--soil-dark);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    cursor:pointer;
    user-select:none;
    transition:transform .08s ease;
    overflow:hidden;
  }
  .plot:active{transform:scale(0.97);}
  .plot::before{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(0,0,0,.12) 1px, transparent 1.5px);
    background-size:9px 9px;
    opacity:.5;
  }
  .plot-left{display:flex; align-items:center; gap:12px; z-index:1;}
  .plot-icon{font-size:30px; line-height:1;}
  .plot-text{display:flex; flex-direction:column;}
  .plot-name{font-weight:700; font-size:14px; color:#fff;}
  .plot-sub{font-size:11px; color:#f0e2cf; font-weight:500;}
  .plot-timer{
    z-index:1;
    font-weight:700;
    font-size:13px;
    color:#fff;
    background:rgba(0,0,0,.28);
    padding:4px 10px;
    border-radius:999px;
    min-width:48px;
    text-align:center;
  }

  .plot.empty .plot-name{color:#e8dcc6;}
  .plot.empty .plot-sub{opacity:.8;}

  .plot.growing{background:linear-gradient(180deg, #6f8f3e, #4f6b2b);}
  .plot.growing .plot-icon{animation:sway 2.2s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}

  .plot.ready{
    background:linear-gradient(180deg, #ffe27a, #ffbf3c);
    border-color:#c98a12;
    box-shadow:0 0 0 3px rgba(255,226,122,.5), 0 0 18px rgba(255,201,60,.7);
    animation:readyPulse 1.4s ease-in-out infinite;
  }
  .plot.ready .plot-name, .plot.ready .plot-sub{color:var(--soil-dark);}
  .plot.ready .plot-timer{background:rgba(0,0,0,.18); color:var(--soil-dark);}
  @keyframes readyPulse{0%,100%{box-shadow:0 0 0 3px rgba(255,226,122,.5), 0 0 10px rgba(255,201,60,.5);}50%{box-shadow:0 0 0 3px rgba(255,226,122,.8), 0 0 22px rgba(255,201,60,.9);}}

  .hint{
    text-align:center;
    font-size:12px;
    color:#5a6b4a;
    margin-top:14px;
    font-weight:500;
    line-height:1.9;
  }

  .toast{
    position:fixed;
    bottom:22px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--soil-dark);
    color:#fffaf0;
    padding:10px 20px;
    border-radius:999px;
    font-weight:700;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){
    .sun, .plot.growing .plot-icon, .plot.ready{animation:none !important;}
  }
</style>
</head>
<body>

<div class="sun"></div>

<header>
  <h1>🌱 مزرعه میوه‌ها</h1>
  <div class="subtitle">زمین مینی — رایگان</div>
</header>

<div class="hud">
  <div class="hud-item"><span class="hud-icon">🥒</span><span id="cucumberCount">0</span></div>
  <div class="hud-item"><span class="hud-icon">🪙</span><span id="coinCount">0</span></div>
</div>

<main>
  <div class="field-label">
    زمین مینی
    <span class="field-tag">۵ خانه</span>
  </div>
  <div class="field">
    <div class="plots" id="plots"></div>
  </div>
  <div class="hint">
    رو یه خانه‌ی خالی بزن تا خیار بکاری 🌱<br>
    وقتی خانه زرد و برق‌دار شد یعنی آماده‌ی برداشته 🌟
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if(tg){ tg.ready(); tg.expand(); }

  // ---- config ----
  const PLOT_COUNT = 5;
  const GROW_SECONDS = 12; // short for easy testing; will tune later
  const STORAGE_KEY = 'fruitfarm_state_v1';

  // ---- state ----
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {
      cucumbers: 0,
      coins: 0,
      plots: Array.from({length:PLOT_COUNT}, () => ({status:'empty', plantedAt:null}))
    };
  }
  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  let state = loadState();

  // ---- render ----
  const plotsEl = document.getElementById('plots');
  const cucumberCountEl = document.getElementById('cucumberCount');
  const coinCountEl = document.getElementById('coinCount');
  const toastEl = document.getElementById('toast');

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 1400);
  }

  function plotStatusNow(plot){
    if(plot.status !== 'growing') return plot.status;
    const elapsed = (Date.now() - plot.plantedAt) / 1000;
    return elapsed >= GROW_SECONDS ? 'ready' : 'growing';
  }

  function remainingSeconds(plot){
    const elapsed = (Date.now() - plot.plantedAt) / 1000;
    return Math.max(0, Math.ceil(GROW_SECONDS - elapsed));
  }

  function render(){
    cucumberCountEl.textContent = state.cucumbers;
    coinCountEl.textContent = state.coins;

    plotsEl.innerHTML = '';
    state.plots.forEach((plot, idx) => {
      const status = plotStatusNow(plot);
      const div = document.createElement('div');
      div.className = 'plot ' + status;

      let icon, name, sub, timerHtml = '';
      if(status === 'empty'){
        icon = '➕'; name = 'خانه خالی'; sub = 'برای کاشت بزن';
      } else if(status === 'growing'){
        icon = '🌱'; name = 'در حال رشد'; sub = 'خیار';
        timerHtml = `<div class="plot-timer">⏱ ${remainingSeconds(plot)}s</div>`;
      } else {
        icon = '🥒'; name = 'آماده برداشت!'; sub = 'برای برداشت بزن';
        timerHtml = `<div class="plot-timer">آماده ✅</div>`;
      }

      div.innerHTML = `
        <div class="plot-left">
          <div class="plot-icon">${icon}</div>
          <div class="plot-text">
            <div class="plot-name">${name}</div>
            <div class="plot-sub">${sub}</div>
          </div>
        </div>
        ${timerHtml}
      `;
      div.addEventListener('click', () => onPlotTap(idx));
      plotsEl.appendChild(div);
    });
  }

  function onPlotTap(idx){
    const plot = state.plots[idx];
    const status = plotStatusNow(plot);

    if(status === 'empty'){
      plot.status = 'growing';
      plot.plantedAt = Date.now();
      showToast('خیار کاشته شد 🌱');
      if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    } else if(status === 'ready'){
      plot.status = 'empty';
      plot.plantedAt = null;
      state.cucumbers += 1;
      showToast('یه خیار برداشت کردی 🥒');
      if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    } else {
      showToast('هنوز در حال رشده ⏳');
      return;
    }
    saveState();
    render();
  }

  render();
  setInterval(render, 1000);
</script>
</body>
</html>
